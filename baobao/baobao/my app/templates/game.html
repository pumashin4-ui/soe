<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #171a1b;
        }
        .game-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .inner-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .game-image { width: 100%; height: 100%; object-fit: cover; }
        .close-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 40px;
            color: #333;
            cursor: pointer;
            z-index: 2;
            padding: 10px;
        }
        .close-button:hover { color: #000; }
        .image-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            padding: 25px;
            background-color: #f1b398;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            gap: 15px;
        }
        .image-overlay h1 { margin: 0; color: #333; font-size: 22px; text-align: center; }
        .username-text { font-style: italic; font-size: 14px; color: #333; margin: 0; }
        .username-input {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            max-width: 200px;
            text-align: center;
        }
        .enter-button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #4b39ef;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            max-width: 150px;
        }
        .enter-button:hover { background-color: #3d2dd1; }
        @media (min-width: 768px) {
            .close-button { top: 30px; left: 30px; font-size: 50px; }
            .image-overlay { max-width: 550px; padding: 30px; gap: 20px; }
            .image-overlay h1 { font-size: 28px; }
            .username-text { font-size: 16px; }
            .username-input { font-size: 16px; padding: 10px 15px; max-width: 220px; }
            .enter-button { font-size: 16px; padding: 12px 24px; max-width: 200px; }
        }
        @media (min-width: 1024px) {
            .close-button { font-size: 70px; }
            .image-overlay { max-width: 600px; padding: 35px; }
            .image-overlay h1 { font-size: 32px; }
            .username-text { font-size: 18px; }
            .username-input { max-width: 250px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="inner-container">
            <img src="../static/images/homepage.png" alt="Game Image" class="game-image">
            <button class="close-button" onclick="window.location.href='index.html'">×</button>
            <div class="image-overlay">
                <h1>HELLO <span id="display-username">PLAYER</span>!!!</h1>
                <p class="username-text">Create your username</p>
                <input type="text" class="username-input" id="usernameInput" placeholder="Enter your username" 
                    onkeypress="if(event.key === 'Enter') goHome()">
                <button class="enter-button" onclick="goHome()">Enter</button>
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('usernameInput');
        const displayUsername = document.getElementById('display-username');

        // Load saved username on page load
        window.onload = function() {
            const savedUsername = localStorage.getItem('username');
            if(savedUsername) {
                usernameInput.value = savedUsername;
                displayUsername.textContent = savedUsername.toUpperCase();
            }
        }

        // Save username and go to home.html
        function goHome() {
            let username = usernameInput.value.trim();
            if(username === "") username = "PLAYER"; // default
            localStorage.setItem('username', username);
            displayUsername.textContent = username.toUpperCase();
            // Redirect to home.html
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
