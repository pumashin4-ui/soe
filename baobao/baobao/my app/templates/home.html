<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #171a1b;
        }

        .game-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .inner-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Mobile buttons (default) */
        .settings-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 30px;
            color: #333;
            cursor: pointer;
            z-index: 2;
            padding: 10px;
        }

        .settings-button:hover {
            color: #000;
        }

        .avatar-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f1b398;
            border: 3px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            z-index: 2;
            transition: transform 0.3s ease;
            padding: 0;
        }

        .avatar-button:hover {
            transform: scale(1.1);
        }

        .kitchen-button {
            position: absolute;
            top: 95px;
            left: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f1b398;
            border: 3px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            z-index: 2;
            transition: transform 0.3s ease;
            padding: 0;
        }

        .kitchen-button:hover {
            transform: scale(1.1);
        }

        /* Tablet (768px and above) */
        @media (min-width: 768px) {
            .settings-button {
                top: 30px;
                right: 40px;
                font-size: 40px;
            }

            .avatar-button {
                top: 30px;
                left: 40px;
                width: 70px;
                height: 70px;
                font-size: 32px;
            }

            .kitchen-button {
                top: 110px;
                left: 40px;
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
        }

        /* Desktop (1024px and above) */
        @media (min-width: 1024px) {
            .settings-button {
                top: 40px;
                right: 50px;
                font-size: 50px;
            }

            .avatar-button {
                top: 40px;
                left: 40px;
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .kitchen-button {
                top: 130px;
                left: 40px;
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="inner-container">
            <img src="../static/images/inside.png" alt="Home Image" class="game-image">
            <button class="kitchen-button">🍳</button>
            <button class="settings-button" onclick="window.location.href='settings.html'">⚙️</button>
            <button class="avatar-button" onclick="window.location.href='profile.html'"></button>
        </div>
    </div>
    <script src="../static/home.js"></script>
</body>
</html>
